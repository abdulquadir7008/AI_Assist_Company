services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      POSTGRES_DB: company_rag
    ports:
      # Host port 5433 to avoid clashing with a locally installed Postgres on 5432.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d company_rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  chroma:
    image: chromadb/chroma:0.5.20
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://rag_user:rag_password@postgres:5432/company_rag?schema=public
      API_PORT: 4000
      CHROMA_URL: http://chroma:8000
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-company_documents}
      DEFAULT_AI_PROVIDER: ${DEFAULT_AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      HUGGINGFACE_CHAT_MODEL: ${HUGGINGFACE_CHAT_MODEL:-meta-llama/Llama-3.1-8B-Instruct}
      HUGGINGFACE_EMBEDDING_MODEL: ${HUGGINGFACE_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      UPLOAD_DIR: /app/uploads
    ports:
      - "4000:4000"
    volumes:
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # The browser calls the API from the host machine.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  chroma_data:
  upload_data:
